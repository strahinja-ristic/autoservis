# Entry point
-keep public class autoservis.servis.MainApp {
    public static void main(java.lang.String[]);
}

# JavaFX Application lifecycle
-keep class * extends javafx.application.Application {
    public void start(javafx.stage.Stage);
    public void stop();
    public void init();
}

# Third-party libraries — don't touch, they may use reflection internally
-keep class org.sqlite.**        { *; }
-keep class org.xerial.**        { *; }
-keep class com.itextpdf.**      { *; }
-keep class org.apache.pdfbox.** { *; }
-keep class org.apache.fontbox.** { *; }
-keep class org.apache.commons.** { *; }
-keep class com.sun.mail.**      { *; }
-keep class javax.mail.**        { *; }
-keep class org.bouncycastle.**  { *; }

# Don't remove anything — only rename
-dontshrink
-dontoptimize

# JavaFX is not in the fat JAR — ignore missing references
-dontwarn javafx.**
-dontwarn com.sun.javafx.**
-dontwarn **

# Keep exception/signature info for runtime correctness
-keepattributes Exceptions,InnerClasses,Signature

# Hide original source file names in stack traces, keep line numbers
-renamesourcefileattribute S
-keepattributes SourceFile,LineNumberTable
